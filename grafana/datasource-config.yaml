apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: monitoring
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        url: http://prometheus:9090
        isDefault: true
        access: proxy
        editable: true

      - name: Elasticsearch
        type: elasticsearch
        url: http://elasticsearch:9200
        database: "logstash-*"
        access: proxy
        editable: true